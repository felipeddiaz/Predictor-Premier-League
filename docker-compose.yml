services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pl-predictor-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./api:/app/api
      - ./core:/app/core
      - ./pipeline:/app/pipeline
      - ./config.py:/app/config.py
      - ./utils.py:/app/utils.py
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pl-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pl-predictor-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pl-network

networks:
  pl-network:
    driver: bridge
