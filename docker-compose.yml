services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pl-predictor-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - pl-network

  # Frontend (development only — in production, deploy to Netlify)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pl-predictor-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      api:
        condition: service_healthy
    networks:
      - pl-network

networks:
  pl-network:
    driver: bridge
